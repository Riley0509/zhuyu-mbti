                        </div>
                    </div>
                    <div class="footer">✨ 命由天定，缘由心生 ✨</div>
                </div>
            `;
            document.getElementById('startBtn')?.addEventListener('click', () => {
                currentPage = 'test';
                testAnswers = [];
                testIndex = 0;
                render();
            });
        }

        function renderTest(container) {
            if (testIndex >= testTotal) {
                const mbtiType = calculateMBTI(testAnswers);
                currentPage = 'result';
                render();
                return;
            }
            const q = testQuestions[testIndex];
            const progress = ((testIndex + 1) / testTotal) * 100;
            container.innerHTML = `
                <div class="container">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progress}%;"></div>
                    </div>
                    <div class="progress-text">${testIndex+1} / ${testTotal}</div>
                    <div class="question-card">
                        <div class="question">${q.question}</div>
                        <div class="description">${q.description}</div>
                        <div class="options">
                            ${q.options.map((opt, idx) => `
                                <div class="option" data-type="${opt.type}">
                                    <div class="option-text">${opt.text}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            document.querySelectorAll('.option').forEach(optDiv => {
                optDiv.addEventListener('click', (e) => {
                    const type = optDiv.dataset.type;
                    testAnswers.push({ questionId: q.id, selectedType: type });
                    testIndex++;
                    renderTest(container);
                });
            });
        }

        function renderResult(container) {
            const mbtiType = calculateMBTI(testAnswers);
            const personality = globalData.personalityTypes[mbtiType];
            if (!personality) {
                container.innerHTML = '<div class="container">结果加载失败，请重试</div>';
                return;
            }
            container.innerHTML = `
                <div class="container">
                    <div class="character-card">
                        <div class="avatar-area">
                            <div class="role-avatar" style="background:#EADBC8; display:flex; align-items:center; justify-content:center; font-size:48px;">📜</div>
                        </div>
                        <div class="role-name">${personality.name}</div>
                        <div class="role-title">${personality.title}</div>
                    </div>
                    <div class="quote-card">
                        <div class="quote">「 ${personality.dramaQuote} 」</div>
                    </div>
                    <div class="section">
                        <div class="section-title">💘 爱情画像</div>
                        <div class="content">${personality.lovePortrait}</div>
                    </div>
                    <div class="section">
                        <div class="section-title">📚 心理学解析</div>
                        <div class="psycho-item">MBTI：${personality.psychology.mbti}</div>
                        <div class="psycho-item">爱情三元论：${personality.psychology.loveTriangle}</div>
                        <div class="psycho-item">依恋类型：${personality.psychology.attachment}</div>
                    </div>
                    <div class="section">
                        <div class="section-title">⚔️ 行为模式</div>
                        <div class="behavior-item">表达爱意：${personality.behavior.expression}</div>
                        <div class="behavior-item">冲突处理：${personality.behavior.conflict}</div>
                        <div class="behavior-item">安全感来源：${personality.behavior.security}</div>
                        <div class="behavior-item">内心恐惧：${personality.behavior.fear}</div>
                    </div>
                    <div class="section match">
                        <div class="section-title">🔮 命定之缘</div>
                        <div class="match-name">${personality.matchName}</div>
                        <div class="match-reason">${personality.matchReason}</div>
                    </div>
                    <div class="section advice">
                        <div class="section-title">🎁 宿命锦囊</div>
                        <div class="content">${personality.advice}</div>
                    </div>
                    <div class="actions">
                        <button class="btn-share" id="shareBtn">📖 分享命书</button>
                        <button class="btn-restart" id="restartBtn">🔄 重测天命</button>
                    </div>
                </div>
            `;
            document.getElementById('shareBtn')?.addEventListener('click', () => {
                if (navigator.share) {
                    navigator.share({
                        title: '逐玉·宿命书',
                        text: `我测出了${personality.name}，你的天命角色是？`,
                        url: window.location.href
                    }).catch(() => {});
                } else {
                    alert('复制链接分享给好友：' + window.location.href);
                }
            });
            document.getElementById('restartBtn')?.addEventListener('click', () => {
                currentPage = 'index';
                render();
            });
        }

        render();
    </script>
</body>
</html>
